trigger:
  branches:
    include:
      - feature/updated-with-all-code

pool:
  vmImage: ubuntu-latest

# ── Deploy target ─────────────────────────────────────────────────────────────
# When manually queuing the pipeline, choose which module to deploy.
# Auto-triggered runs (push) always use the default "all".
#
#   all              → full terraform plan/apply (no -target flag)
#   storage_account  → ONLY the two modules below, nothing else:
#                        module.resource_group   ← storage account cannot exist without an RG
#                        module.storage_account  ← the actual target
#
#                      VM, NIC, NSG, Route Table, Managed Disk, Managed Identity
#                      are NOT touched — they have zero dependency on storage account.
#
#                      NOTE: admin_username / admin_password are still passed because
#                      Terraform requires all declared root variables to have values
#                      even when -target limits what gets applied.
#
# To add another targeted module in the future:
#   1. Add a new value to the list below (e.g. "virtual_machine")
#   2. Add a matching condition to the targetFlag variable beneath,
#      listing the module AND all its dependencies explicitly.
# ─────────────────────────────────────────────────────────────────────────────
parameters:
- name: deployTarget
  displayName: 'Deploy Target'
  type: string
  default: 'all'
  values:
  - all
  - storage_account

variables:
- group: Windows_VM_Credentials   # contains: admin_username (plain) and admin_password (secret)
- name: serviceConnection
  value: 'ado-2-azure'
- name: backendResourceGroup
  value: 'rg-tf-state'
- name: backendStorageAccount
  value: 'saeusterrasta01'
- name: backendContainer
  value: 'tfstate'
- name: stateKey
  value: 'dev/terraform.tfstate'
- name: varFile
  value: 'environments/dev.tfvars'
# Resolved at compile time from the parameter above.
# Empty string = no -target flag = full deploy.
# Both targets are listed explicitly — do not rely on Terraform's implicit
# dependency resolution so it is always obvious exactly what will be deployed.
- name: targetFlag
  value: ${{ if eq(parameters.deployTarget, 'storage_account') }}-target=module.resource_group -target=module.storage_account${{ end }}

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 1: VALIDATE — runs FIRST on every push. Cheap, fast checks that catch
# ~60% of bugs before we ever talk to Azure. Fails fast = saves money + time.
#   - terraform fmt    → code formatting consistency
#   - tflint           → deprecated syntax, naming rules, Azure best practices
#   - tfsec            → security misconfigurations (public storage, open NSGs)
#   - terraform validate → syntax + variable references
# ══════════════════════════════════════════════════════════════════════════════
stages:

- stage: Validate
  displayName: 'Static Validation & Security Scan'
  jobs:
  - job: StaticChecks
    displayName: 'Lint, Format, Security Scan'
    steps:

    - task: TerraformInstaller@1
      displayName: 'Install Terraform'
      inputs:
        terraformVersion: 'latest'

    # ─── Format check ─────────────────────────────────────────────────────
    # -check : report unformatted files without modifying them
    # -recursive : check all subdirectories
    # Fails the pipeline if anyone commits unformatted code (e.g. wrong indentation, misaligned blocks, etc.). before proceeding to further 
    - script: terraform fmt -check -recursive
      displayName: 'Terraform Format Check'

    # ─── Syntax + reference validation ────────────────────────────────────
    # -backend=false skips talking to Azure backend storage account just for syntax check.
    # Makes this step ~10x faster than a full init.
    - script: |
        terraform init -backend=false
        terraform validate
      displayName: 'Terraform Validate (syntax)'

    # ─── TFLint ───────────────────────────────────────────────────────────
    # Catches: deprecated syntax, unused vars, naming convention violations,
    # Azure-specific anti-patterns (e.g. unsupported VM SKUs in a region).
    - script: |
        curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
        tflint --init
        tflint --recursive
      displayName: 'TFLint'

    # ─── tfsec ────────────────────────────────────────────────────────────
    # Static security scan. Catches things like:
    #   - Storage accounts allowing public blob access
    #   - NSG rules with source = *
    #   - VMs without disk encryption
    #   - Key Vaults without soft-delete
    # --soft-fail : report findings but don't fail the build (yet).
    # Once your codebase is clean, REMOVE --soft-fail to make it a hard gate.
    - script: |
        curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
        tfsec . --soft-fail
      displayName: 'tfsec Security Scan'

# ══════════════════════════════════════════════════════════════════════════════
# DEV — runs only if Validate passes. Auto-deploys on every push.
# ══════════════════════════════════════════════════════════════════════════════
- stage: Dev
  displayName: 'Deploy to Dev'
  dependsOn: Validate
  condition: succeeded('Validate')

  jobs:
  - job: TerraformDev
    displayName: 'Terraform Dev'
    steps:

    - task: TerraformInstaller@1
      displayName: 'Install Terraform'
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTaskV4@4
      displayName: 'Init (Dev)'
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: $(serviceConnection)
        backendAzureRmResourceGroupName: $(backendResourceGroup)
        backendAzureRmStorageAccountName: $(backendStorageAccount)
        backendAzureRmContainerName: $(backendContainer)
        backendAzureRmKey: $(stateKey)
        commandOptions: '-backend-config="use_azuread_auth=true"'

    - task: TerraformTaskV4@4
      displayName: 'Validate (Dev)'
      inputs:
        provider: 'azurerm'
        command: 'validate'

    - task: TerraformTaskV4@4
      displayName: 'Plan (Dev)'
      inputs:
        provider: 'azurerm'
        command: 'plan'
        # $(targetFlag) is empty for a full deploy.
        # For storage_account target it expands to:
        #   -target=module.resource_group -target=module.storage_account
        # -target is only set in plan; apply receives the plan file which already encodes the scope.
        commandOptions: '$(targetFlag) -var-file=$(varFile) -out=tfplan-dev' ## -var="admin_username=$(admin_username)" -var="admin_password=$(admin_password)" -out=tfplan-dev'
        environmentServiceNameAzureRM: $(serviceConnection)

    - task: TerraformTaskV4@4
      displayName: 'Apply (Dev)'
      inputs:
        provider: 'azurerm'
        command: 'apply'
        commandOptions: '-auto-approve tfplan-dev'
        environmentServiceNameAzureRM: $(serviceConnection)

# ══════════════════════════════════════════════════════════════════════════════
# TEST — runs after Dev succeeds; requires manual approval via Environment
# ══════════════════════════════════════════════════════════════════════════════
- stage: Test
  displayName: 'Deploy to Test'
  dependsOn: Dev
  condition: succeeded('Dev')
  variables:
    varFile: 'environments/test.tfvars'
    stateKey: 'test/terraform.tfstate'

  jobs:
  - deployment: TerraformTest
    displayName: 'Terraform Test'
    environment: 'test'
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - task: TerraformInstaller@1
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: 'latest'

          - task: TerraformTaskV4@4
            displayName: 'Init (Test)'
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: $(serviceConnection)
              backendAzureRmResourceGroupName: $(backendResourceGroup)
              backendAzureRmStorageAccountName: $(backendStorageAccount)
              backendAzureRmContainerName: $(backendContainer)
              backendAzureRmKey: $(stateKey)
              commandOptions: '-backend-config="use_azuread_auth=true"'

          - task: TerraformTaskV4@4
            displayName: 'Validate (Test)'
            inputs:
              provider: 'azurerm'
              command: 'validate'

          - task: TerraformTaskV4@4
            displayName: 'Plan (Test)'
            inputs:
              provider: 'azurerm'
              command: 'plan'
              commandOptions: '$(targetFlag) -var-file=$(varFile) -var="admin_username=$(admin_username)" -var="admin_password=$(admin_password)" -out=tfplan-test'
              environmentServiceNameAzureRM: $(serviceConnection)

          - task: TerraformTaskV4@4
            displayName: 'Apply (Test)'
            inputs:
              provider: 'azurerm'
              command: 'apply'
              commandOptions: '-auto-approve tfplan-test'
              environmentServiceNameAzureRM: $(serviceConnection)

# ══════════════════════════════════════════════════════════════════════════════
# PROD — runs after Test succeeds; requires manual approval via Environment
# ══════════════════════════════════════════════════════════════════════════════
- stage: Prod
  displayName: 'Deploy to Prod'
  dependsOn: Test
  condition: succeeded('Test')
  variables:
    varFile: 'environments/prod.tfvars'
    stateKey: 'prod/terraform.tfstate'

  jobs:
  - deployment: TerraformProd
    displayName: 'Terraform Prod'
    environment: 'prod'
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - task: TerraformInstaller@1
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: 'latest'

          - task: TerraformTaskV4@4
            displayName: 'Init (Prod)'
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: $(serviceConnection)
              backendAzureRmResourceGroupName: $(backendResourceGroup)
              backendAzureRmStorageAccountName: $(backendStorageAccount)
              backendAzureRmContainerName: $(backendContainer)
              backendAzureRmKey: $(stateKey)
              commandOptions: '-backend-config="use_azuread_auth=true"'

          - task: TerraformTaskV4@4
            displayName: 'Validate (Prod)'
            inputs:
              provider: 'azurerm'
              command: 'validate'

          - task: TerraformTaskV4@4
            displayName: 'Plan (Prod)'
            inputs:
              provider: 'azurerm'
              command: 'plan'
              commandOptions: '$(targetFlag) -var-file=$(varFile) -var="admin_username=$(admin_username)" -var="admin_password=$(admin_password)" -out=tfplan-prod'
              environmentServiceNameAzureRM: $(serviceConnection)

          - task: TerraformTaskV4@4
            displayName: 'Apply (Prod)'
            inputs:
              provider: 'azurerm'
              command: 'apply'
              commandOptions: '-auto-approve tfplan-prod'
              environmentServiceNameAzureRM: $(serviceConnection)
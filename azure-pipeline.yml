trigger:
  branches:
    include:
      - feature/updated-with-all-code

pool:
  name: 'terraform-pool'
  demands:
    - terraform

variables:
  serviceConnection: 'ado-2-azure'
  backendResourceGroup: 'rg-tf-state'
  backendStorageAccount: 'terrastatesa'
  backendContainer: 'tfstate'
  stateKey: 'dev/terraform.tfstate'
  # These variables are used in each stage; they get overridden with env-specific values there
  environment: 'dev'
  varFile: 'environments/dev.tfvars'
  vmAdminPassword: $(TF_VAR_admin_password)   # <-- set this secret variable in your pipeline or variable group; prefix with TF_VAR_ to pass it through to Terraform
  vmAdminUsername: $(TF_VAR_admin_username)                    # <-- this is a non-secret variable, so we can set it here at the top level

# ── Stage template (reused for dev / test / prod) ─────────────────────────────
# Each stage calls init → validate → plan → apply using the env-specific
# .tfvars file and a separate state key so environments never share state.
# admin_password is pulled from an Azure DevOps secret variable group.
# ─────────────────────────────────────────────────────────────────────────────

stages:

# ══════════════════════════════════════════════════════════════════════════════
# DEV  — runs automatically on every merge to master
# ══════════════════════════════════════════════════════════════════════════════
- stage: Dev
  displayName: 'Deploy to Dev'
  

  jobs:
  - job: TerraformDev
    displayName: 'Terraform Dev'
    steps:

    - task: TerraformTaskV4@4
      displayName: 'Init (Dev)'
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: $(serviceConnection)
        backendAzureRmResourceGroupName: $(backendResourceGroup)
        backendAzureRmStorageAccountName: $(backendStorageAccount)
        backendAzureRmContainerName: $(backendContainer)
        backendAzureRmKey: $(stateKey)

    - task: TerraformTaskV4@4
      displayName: 'Validate (Dev)'
      inputs:
        provider: 'azurerm'
        command: 'validate'

    - task: TerraformTaskV4@4
      displayName: 'Plan (Dev)'
      inputs:
        provider: 'azurerm'
        command: 'plan'
        commandOptions: '-var-file=$(varFile) -var="admin_password=$(TF_VAR_admin_password)" -out=tfplan-dev'
        environmentServiceNameAzureRM: $(serviceConnection)

    - task: TerraformTaskV4@4
      displayName: 'Apply (Dev)'
      inputs:
        provider: 'azurerm'
        command: 'apply'
        commandOptions: '-auto-approve tfplan-dev'
        environmentServiceNameAzureRM: $(serviceConnection)

# ══════════════════════════════════════════════════════════════════════════════
# TEST — runs after Dev succeeds; requires manual approval
# ══════════════════════════════════════════════════════════════════════════════
- stage: Test
  displayName: 'Deploy to Test'
  dependsOn: Dev
  condition: succeeded('Dev')
  variables:
    environment: 'test'
    varFile: 'environments/test.tfvars'
    stateKey: 'test/terraform.tfstate'
    vmAdminPassword: $(TF_VAR_admin_password)   # <-- set this secret variable in your pipeline or variable group; prefix with TF_VAR_ to pass it through to Terraform
    vmAdminUsername: $(TF_VAR_admin_username)                    # <-- this is a non-secret variable, so we can set it here at the top level

  jobs:
  - deployment: TerraformTest
    displayName: 'Terraform Test'
    environment: 'test'          # <-- create this environment in ADO → Pipelines → Environments; add an approval gate there
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - task: TerraformTaskV4@4
            displayName: 'Init (Test)'
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: $(serviceConnection)
              backendAzureRmResourceGroupName: $(backendResourceGroup)
              backendAzureRmStorageAccountName: $(backendStorageAccount)
              backendAzureRmContainerName: $(backendContainer)
              backendAzureRmKey: $(stateKey)

          - task: TerraformTaskV4@4
            displayName: 'Validate (Test)'
            inputs:
              provider: 'azurerm'
              command: 'validate'

          - task: TerraformTaskV4@4
            displayName: 'Plan (Test)'
            inputs:
              provider: 'azurerm'
              command: 'plan'
              commandOptions: '-var-file=$(varFile) -var="admin_password=$(TF_VAR_admin_password)" -out=tfplan-test'
              environmentServiceNameAzureRM: $(serviceConnection)

          - task: TerraformTaskV4@4
            displayName: 'Apply (Test)'
            inputs:
              provider: 'azurerm'
              command: 'apply'
              commandOptions: '-auto-approve tfplan-test'
              environmentServiceNameAzureRM: $(serviceConnection)

# ══════════════════════════════════════════════════════════════════════════════
# PROD — runs after Test succeeds; requires manual approval
# ══════════════════════════════════════════════════════════════════════════════
- stage: Prod
  displayName: 'Deploy to Prod'
  dependsOn: Test
  condition: succeeded('Test')
  variables:
    environment: 'prod'
    varFile: 'environments/prod.tfvars'
    stateKey: 'prod/terraform.tfstate'
    vmAdminPassword: $(TF_VAR_admin_password)   # <-- set this secret variable in your pipeline or variable group; prefix with TF_VAR_ to pass it through to Terraform
    vmAdminUsername: $(TF_VAR_admin_username)                    # <-- this is a non-secret variable, so we can set it here at the top level

  jobs:
  - deployment: TerraformProd
    displayName: 'Terraform Prod'
    environment: 'prod'          # <-- create this environment in ADO → Pipelines → Environments; add an approval gate there
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - task: TerraformTaskV4@4
            displayName: 'Init (Prod)'
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: $(serviceConnection)
              backendAzureRmResourceGroupName: $(backendResourceGroup)
              backendAzureRmStorageAccountName: $(backendStorageAccount)
              backendAzureRmContainerName: $(backendContainer)
              backendAzureRmKey: $(stateKey)

          - task: TerraformTaskV4@4
            displayName: 'Validate (Prod)'
            inputs:
              provider: 'azurerm'
              command: 'validate'

          - task: TerraformTaskV4@4
            displayName: 'Plan (Prod)'
            inputs:
              provider: 'azurerm'
              command: 'plan'
              commandOptions: '-var-file=$(varFile) -var="admin_password=$(TF_VAR_admin_password)" -out=tfplan-prod'
              environmentServiceNameAzureRM: $(serviceConnection)

          - task: TerraformTaskV4@4
            displayName: 'Apply (Prod)'
            inputs:
              provider: 'azurerm'
              command: 'apply'
              commandOptions: '-auto-approve tfplan-prod'
              environmentServiceNameAzureRM: $(serviceConnection)

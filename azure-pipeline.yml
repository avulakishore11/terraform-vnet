trigger:
 branches:
   exclude:
    - feature/terraform-backend
   include:
     - master
pool:
  name: 'terraform-pool'
  demands:
    - terraform 

variables:
 Subscription: 

stages:
- stage: 
  jobs:
    - job: 'init'
      steps:
      - task: TerraformTask@5
        inputs:
          provider: 'azurerm'
          command: 'init'
          backendServiceArm: 'ado-2-azure'
          backendAzureRmResourceGroupName: 'rg-tf-state'
          backendAzureRmStorageAccountName: 'terrastatesa'
          backendAzureRmContainerName: 'tfstate'
          backendAzureRmKey: 'vnet.tfstate' #  filename of the Terraform state file that gets stored inside your blob container.

      - task: TerraformTaskV4@4
        displayName: 'validation'
        inputs:
          provider: 'azurerm'
          command: 'validate'
      - task: TerraformTask@5
        inputs:
            provider: 'azurerm'
            command: 'plan'
            commandOptions: '-out=tfplan'
            

      - task: TerraformTaskV4@4
        displayName: 'apply'
        inputs:
            provider: 'azurerm'
            command: 'apply'
            commandOptions: '-auto-approve tfplan'

    
trigger:
  branches:
    include:
      - feature/updated-with-all-code

pool:
  vmImage: ubuntu-latest

variables:
- group: Windows_VM_Credentials   # contains: admin_username (plain) and admin_password (secret)
- name: serviceConnection
  value: 'ado-2-azure'
- name: backendResourceGroup
  value: 'rg-tf-state'
- name: backendStorageAccount
  value: 'saeusterrasta01'
- name: backendContainer
  value: 'tfstate'
- name: stateKey
  value: 'dev/terraform.tfstate'
- name: varFile
  value: 'environments/dev.tfvars'
# ── Destroy gate ──────────────────────────────────────────────────────────────
# ENABLE_DESTROY defaults to false so destroy NEVER runs on a normal push.
# To destroy infrastructure: queue this pipeline manually and set
# ENABLE_DESTROY=true at queue time. The Destroy stage then requires a second
# confirmation via Azure DevOps environment approval + ManualValidation task.
- name: ENABLE_DESTROY
  value: 'false'

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 1: VALIDATE — runs FIRST on every push. Cheap, fast checks that catch
# ~60% of bugs before we ever talk to Azure. Fails fast = saves money + time.
#   - terraform fmt    → code formatting consistency
#   - tflint           → deprecated syntax, naming rules, Azure best practices
#   - tfsec            → security misconfigurations (public storage, open NSGs)
#   - terraform validate → syntax + variable references
# ══════════════════════════════════════════════════════════════════════════════
stages:

- stage: Validate
  displayName: 'Static Validation & Security Scan'
  jobs:
  - job: StaticChecks
    displayName: 'Lint, Format, Security Scan'
    steps:

    - task: TerraformInstaller@1
      displayName: 'Install Terraform'
      inputs:
        terraformVersion: 'latest'

    # ─── Format check ─────────────────────────────────────────────────────
    # -check : report unformatted files without modifying them
    # -recursive : check all subdirectories
    # Fails the pipeline if anyone commits unformatted code (e.g. wrong indentation, misaligned blocks, etc.). before proceeding to further 
    - script: terraform fmt -recursive
      displayName: 'Terraform Format Check'

    # ─── Syntax + reference validation ────────────────────────────────────
    # -backend=false skips talking to Azure backend storage account just for syntax check.
    # Makes this step ~10x faster than a full init.
    - script: |
        terraform init -backend=false
        terraform validate
      displayName: 'Terraform Validate (syntax)'

    # ─── TFLint ───────────────────────────────────────────────────────────
    # Catches: deprecated syntax, unused vars, naming convention violations,
    # Azure-specific anti-patterns (e.g. unsupported VM SKUs in a region).
    - script: |
        curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
        tflint --init
        tflint --recursive
      displayName: 'TFLint'

    # ─── tfsec ────────────────────────────────────────────────────────────
    # Static security scan. Catches things like:
    #   - Storage accounts allowing public blob access
    #   - NSG rules with source = *
    #   - VMs without disk encryption
    #   - Key Vaults without soft-delete
    # --soft-fail : report findings but don't fail the build (yet).
    # Once your codebase is clean, REMOVE --soft-fail to make it a hard gate.
    - script: |
        curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
        tfsec . --soft-fail
      displayName: 'tfsec Security Scan'

# ══════════════════════════════════════════════════════════════════════════════
# DEV — runs only if Validate passes. Auto-deploys on every push.
# ══════════════════════════════════════════════════════════════════════════════
# Deploy stages are skipped when ENABLE_DESTROY=true so only the Destroy stage runs.
- stage: Dev
  displayName: 'Deploy to Dev'
  dependsOn: Validate
  condition: and(succeeded('Validate'), ne(variables['ENABLE_DESTROY'], 'true'))

  jobs:
  - job: TerraformDev
    displayName: 'Terraform Dev'
    steps:

    - task: TerraformInstaller@1
      displayName: 'Install Terraform'
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTaskV4@4
      displayName: 'Init (Dev)'
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: $(serviceConnection)
        backendAzureRmResourceGroupName: $(backendResourceGroup)
        backendAzureRmStorageAccountName: $(backendStorageAccount)
        backendAzureRmContainerName: $(backendContainer)
        backendAzureRmKey: $(stateKey)
        commandOptions: '-backend-config="use_azuread_auth=true"'

    - task: TerraformTaskV4@4
      displayName: 'Validate (Dev)'
      inputs:
        provider: 'azurerm'
        command: 'validate'

    - task: TerraformTaskV4@4
      displayName: 'Plan (Dev)'
      inputs:
        provider: 'azurerm'
        command: 'plan'
        commandOptions: '-var-file=$(varFile) -var="admin_username=$(admin_username)" -var="admin_password=$(admin_password)" -out=tfplan-dev'
        environmentServiceNameAzureRM: $(serviceConnection)

    - task: TerraformTaskV4@4
      displayName: 'Apply (Dev)'
      inputs:
        provider: 'azurerm'
        command: 'apply'
        commandOptions: '-auto-approve tfplan-dev'
        environmentServiceNameAzureRM: $(serviceConnection)
    

    - task: TerraformTaskV4@4
      displayName: 'Output (Dev)'
      inputs:
        provider: 'azurerm'
        command: 'output'
        commandOptions: '-json'
        environmentServiceNameAzureRM: $(serviceConnection)
    # Destroy is intentionally removed from this job.
    # Use the dedicated Destroy stage by queuing the pipeline with ENABLE_DESTROY=true.

# ══════════════════════════════════════════════════════════════════════════════
# TEST — runs after Dev succeeds; requires manual approval via Environment
# ══════════════════════════════════════════════════════════════════════════════
- stage: Test
  displayName: 'Deploy to Test'
  dependsOn: Dev
  condition: and(succeeded('Dev'), ne(variables['ENABLE_DESTROY'], 'true'))
  variables:
    varFile: 'environments/test.tfvars'
    stateKey: 'test/terraform.tfstate'

  jobs:
  - deployment: TerraformTest
    displayName: 'Terraform Test'
    environment: 'test'
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - task: TerraformInstaller@1
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: 'latest'

          - task: TerraformTaskV4@4
            displayName: 'Init (Test)'
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: $(serviceConnection)
              backendAzureRmResourceGroupName: $(backendResourceGroup)
              backendAzureRmStorageAccountName: $(backendStorageAccount)
              backendAzureRmContainerName: $(backendContainer)
              backendAzureRmKey: $(stateKey)
              commandOptions: '-backend-config="use_azuread_auth=true"'

          - task: TerraformTaskV4@4
            displayName: 'Validate (Test)'
            inputs:
              provider: 'azurerm'
              command: 'validate'

          - task: TerraformTaskV4@4
            displayName: 'Plan (Test)'
            inputs:
              provider: 'azurerm'
              command: 'plan'
              commandOptions: '-var-file=$(varFile) -var="admin_username=$(admin_username)" -var="admin_password=$(admin_password)" -out=tfplan-test'
              environmentServiceNameAzureRM: $(serviceConnection)

          - task: TerraformTaskV4@4
            displayName: 'Apply (Test)'
            inputs:
              provider: 'azurerm'
              command: 'apply'
              commandOptions: '-auto-approve tfplan-test'
              environmentServiceNameAzureRM: $(serviceConnection)

# ══════════════════════════════════════════════════════════════════════════════
# PROD — runs after Test succeeds; requires manual approval via Environment
# ══════════════════════════════════════════════════════════════════════════════
- stage: Prod
  displayName: 'Deploy to Prod'
  dependsOn: Test
  condition: and(succeeded('Test'), ne(variables['ENABLE_DESTROY'], 'true'))
  variables:
    varFile: 'environments/prod.tfvars'
    stateKey: 'prod/terraform.tfstate'

  jobs:
  - deployment: TerraformProd
    displayName: 'Terraform Prod'
    environment: 'prod'
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - task: TerraformInstaller@1
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: 'latest'

          - task: TerraformTaskV4@4
            displayName: 'Init (Prod)'
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: $(serviceConnection)
              backendAzureRmResourceGroupName: $(backendResourceGroup)
              backendAzureRmStorageAccountName: $(backendStorageAccount)
              backendAzureRmContainerName: $(backendContainer)
              backendAzureRmKey: $(stateKey)
              commandOptions: '-backend-config="use_azuread_auth=true"'

          - task: TerraformTaskV4@4
            displayName: 'Validate (Prod)'
            inputs:
              provider: 'azurerm'
              command: 'validate'

          - task: TerraformTaskV4@4
            displayName: 'Plan (Prod)'
            inputs:
              provider: 'azurerm'
              command: 'plan'
              commandOptions: '-var-file=$(varFile) -var="admin_username=$(admin_username)" -var="admin_password=$(admin_password)" -out=tfplan-prod'
              environmentServiceNameAzureRM: $(serviceConnection)

          - task: TerraformTaskV4@4
            displayName: 'Apply (Prod)'
            inputs:
              provider: 'azurerm'
              command: 'apply'
              commandOptions: '-auto-approve tfplan-prod'
              environmentServiceNameAzureRM: $(serviceConnection)

# ══════════════════════════════════════════════════════════════════════════════
# DESTROY — never runs on a normal push (ENABLE_DESTROY defaults to false).
#
# HOW TO TRIGGER:
#   1. Queue this pipeline manually in Azure DevOps.
#   2. Override variable: ENABLE_DESTROY = true
#   3. Approve the 'destroy-approval' environment gate (set up approvers in
#      Azure DevOps → Environments → destroy-approval → Approvals & checks).
#   4. Approve the ManualValidation task inside the stage.
#
# Two independent human approvals are required before any resource is deleted.
# ══════════════════════════════════════════════════════════════════════════════
- stage: Destroy
  displayName: 'Destroy Infrastructure'
  dependsOn: Validate
  # Condition 1: only runs when ENABLE_DESTROY is explicitly set to 'true' at queue time.
  # Every normal push leaves ENABLE_DESTROY='false' so this stage is always skipped.
  condition: and(succeeded('Validate'), eq(variables['ENABLE_DESTROY'], 'true'))

  jobs:
  - deployment: TerraformDestroy
    displayName: 'Terraform Destroy'
    # Condition 2: the 'destroy-approval' environment must have approvers configured
    # in Azure DevOps → Environments → destroy-approval → Approvals & checks.
    # The pipeline pauses here until a designated approver clicks Approve.
    environment: 'destroy-approval'
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - task: TerraformInstaller@1
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: 'latest'

          - task: TerraformTaskV4@4
            displayName: 'Init (Destroy)'
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: $(serviceConnection)
              backendAzureRmResourceGroupName: $(backendResourceGroup)
              backendAzureRmStorageAccountName: $(backendStorageAccount)
              backendAzureRmContainerName: $(backendContainer)
              backendAzureRmKey: $(stateKey)
              commandOptions: '-backend-config="use_azuread_auth=true"'

          # Generate a destroy plan first so approvers can see exactly what
          # will be deleted before the final ManualValidation gate.
          - task: TerraformTaskV4@4
            displayName: 'Plan Destroy (review before approving)'
            inputs:
              provider: 'azurerm'
              command: 'plan'
              commandOptions: '-destroy -var-file=$(varFile) -var="admin_username=$(admin_username)" -var="admin_password=$(admin_password)" -out=tfplan-destroy'
              environmentServiceNameAzureRM: $(serviceConnection)

          # Condition 3: a human must read the destroy plan above and explicitly
          # click Resume in the pipeline UI. Timeout = reject (safe default).
          - task: ManualValidation@0
            displayName: 'Final confirmation — review destroy plan then approve'
            inputs:
              instructions: |
                ⚠️  DESTRUCTIVE OPERATION — READ BEFORE APPROVING  ⚠️

                The terraform destroy plan has been generated in the step above.
                Review it carefully in the pipeline logs before proceeding.

                Environment : $(varFile)
                State key   : $(stateKey)
                Subscription: $(backendResourceGroup)

                Click Resume only if you are certain every resource listed
                in the plan should be permanently deleted.
                Click Reject to abort safely — no resources will be touched.
              onTimeout: 'reject'
              timeoutInMinutes: 60

          # -auto-approve is intentional here: all three human gates above
          # (variable override + environment approval + ManualValidation) have
          # already confirmed intent. The CLI flag is not the safety mechanism —
          # the pipeline gates are.
          - task: TerraformTaskV4@4
            displayName: 'Destroy'
            inputs:
              provider: 'azurerm'
              command: 'destroy'
              commandOptions: '-auto-approve -var-file=$(varFile) -var="admin_username=$(admin_username)" -var="admin_password=$(admin_password)"'
              environmentServiceNameAzureRM: $(serviceConnection)